<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивный тренажёр ПДД с ИИ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Адаптивный тренажёр ПДД</h1>
            <p>ИИ подбирает вопросы под ваши слабые места</p>
        </header>

        <div class="stats-panel">
            <h3>📊 Статистика по темам</h3>
            <div id="topics-stats"></div>
        </div>

        <div class="quiz-area" id="quiz-area">
            <div class="question-header">
                <span id="question-counter">Вопрос 1</span>
                <span id="topic-badge" class="topic-badge"></span>
            </div>
            <div id="question-text" class="question-text"></div>
            <div id="options" class="options"></div>
            <button id="submit-btn" class="btn-submit">Ответить</button>
        </div>

        <div id="result-area" class="result-area" style="display:none;">
            <div class="feedback"></div>
            <button id="next-btn" class="btn-next">Следующий вопрос</button>
        </div>

        <div id="final-area" style="display:none;">
            <div class="final-message">
                <h2>🎉 Тренировка завершена! 🎉</h2>
                <div id="final-advice" class="advice"></div>
                <button id="restart-btn" class="btn-restart">Пройти заново</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
